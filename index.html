  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "CrossCareers",
    "url": "https://crosscareers.com/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://crosscareers.com/?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

    ]
  }
  </script>
